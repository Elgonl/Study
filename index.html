<!DOCTYPE html>
<html>
<head>
  <title>Study Battle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>⚔️ Study Battle</h1>

  <div class="stats">
    <p>❤️ Player HP: <span id="playerHP">100</span></p>
    <p>👾 Enemy HP: <span id="enemyHP">100</span></p>
    <p>⭐ XP: <span id="xp">0</span> | Level: <span id="level">1</span></p>
  </div>

  <div class="question-box">
    <h2 id="question">Loading...</h2>
    <div id="answers"></div>
  </div>

  <button onclick="resetGame()">Reset Save</button>

  <script src="script.js"></script>
</body>
</html>
